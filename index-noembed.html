<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>英语48音标 — 视频跟学</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="48音标">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg:#f6f7f2; --ink:#202426; --muted:#667071; --line:#d8ded6;
      --panel:#fff; --accent:#0f766e; --accent2:#c2410c; --accent3:#4f46e5;
      --good:#15803d; --bad:#b91c1c; --shadow:0 8px 30px rgba(0,0,0,.08); --r:8px;
    }
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.5}
    button,input{font:inherit}
    .app{min-height:100vh;display:flex;flex-direction:column;max-width:900px;margin:0 auto}
    
    /* Header */
    header{padding:12px 16px;display:flex;align-items:center;gap:12px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
    header h1{font-size:20px;margin:0;flex:1}
    header button{min-height:36px;padding:6px 14px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);cursor:pointer;font-size:14px}
    header button.accent{background:var(--accent);color:#fff;border-color:var(--accent)}

    /* Video */
    .video-wrap{position:relative;background:#111827;margin:0;color:#fff;padding:22px 16px;text-align:center}
    .video-panel{display:grid;gap:10px;place-items:center;min-height:150px}
    .video-panel a{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 16px;border-radius:var(--r);background:var(--accent);color:#fff;text-decoration:none;font-weight:700}
    .video-panel p{margin:0;color:#cbd5e1;font-size:14px;max-width:680px}
    .now-badge{
      position:absolute;top:8px;left:8px;z-index:5;
      background:var(--accent);color:#fff;padding:6px 14px;border-radius:999px;
      font-size:18px;font-weight:700;letter-spacing:1px;
      transition:opacity .2s;pointer-events:none;
    }
    .now-badge.hidden{opacity:0}

    /* Tabs */
    nav.tabs{display:flex;gap:0;border-bottom:1px solid var(--line);background:var(--panel);overflow-x:auto}
    nav.tabs button{flex:1;min-width:70px;padding:12px 8px;border:0;background:transparent;color:var(--muted);cursor:pointer;font-size:14px;border-bottom:2px solid transparent;white-space:nowrap}
    nav.tabs button.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:650}

    /* Content */
    main{flex:1;padding:12px;overflow-y:auto}
    .view{display:none}
    .view.active{display:block}

    /* Stats */
    .stats{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}
    .stat{flex:1;min-width:80px;padding:10px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);text-align:center}
    .stat strong{display:block;font-size:20px}
    .stat span{font-size:11px;color:var(--muted)}

    /* Filters */
    .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .filters button{padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:var(--panel);cursor:pointer;font-size:12px}
    .filters button.active{background:var(--ink);color:#fff;border-color:var(--ink)}

    /* Search */
    .search{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px;background:#fff}

    /* Cards grid */
    .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-top:8px}
    .card{
      padding:12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
      cursor:pointer;transition:transform .12s,box-shadow .12s,border-color .12s;
    }
    .card:active{transform:scale(.97)}
    .card.now{border-color:var(--accent);box-shadow:0 0 0 3px rgba(15,118,110,.2)}
    .card .sym{font-size:30px;font-weight:750;line-height:1.1}
    .card .tag{display:inline-block;padding:2px 6px;border-radius:999px;color:#fff;font-size:10px;margin-bottom:4px}
    .card .tag.vowel{background:var(--accent)}
    .card .tag.consonant{background:var(--accent2)}
    .card .eg{font-size:12px;color:var(--muted);margin:4px 0}
    .card .tip{font-size:11px;color:var(--ink);background:#f0f4ef;padding:6px;border-radius:4px}
    .card .acts{display:flex;gap:6px;margin-top:6px}
    .card .acts button{flex:1;min-height:28px;font-size:11px;border:1px solid var(--line);border-radius:4px;background:var(--panel);cursor:pointer}

    /* Quiz */
    .quiz-sym{font-size:80px;font-weight:800;text-align:center;margin:12px 0}
    .quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .quiz-choices button{padding:14px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);cursor:pointer;text-align:left;font-size:15px}
    .quiz-choices button.correct{border-color:var(--good);background:#e8f5ec}
    .quiz-choices button.wrong{border-color:var(--bad);background:#fae8e8}
    .quiz-fb{text-align:center;font-weight:650;min-height:28px;margin:10px 0}

    /* Practice */
    .practice-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
    .practice-top{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:start}
    .practice-symbol{font-size:72px;font-weight:850;line-height:1}
    .practice-word{font-size:28px;font-weight:750;margin:8px 0 2px}
    .practice-sentence{padding:10px 12px;background:#f0f4ef;border-radius:var(--r);margin:10px 0;color:var(--ink)}
    .practice-select{min-height:40px;padding:8px 10px;border:1px solid var(--line);border-radius:var(--r);background:#fff;max-width:100%}
    .practice-actions{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
    .practice-actions button,.practice-actions a{min-height:40px;padding:8px 12px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);cursor:pointer;text-decoration:none;color:var(--ink);display:inline-flex;align-items:center}
    .practice-actions .accent{background:var(--accent);border-color:var(--accent);color:#fff}
    .score-box{display:grid;grid-template-columns:92px minmax(0,1fr);gap:12px;align-items:center;margin-top:12px;padding:12px;border:1px solid var(--line);border-radius:var(--r);background:#fbfcf8}
    .score-circle{width:82px;height:82px;border-radius:50%;display:grid;place-items:center;background:#e3e8e0;font-size:24px;font-weight:850;color:var(--ink)}
    .score-circle.good{background:#dcfce7;color:var(--good)}
    .score-circle.mid{background:#fef3c7;color:#92400e}
    .score-circle.bad{background:#fee2e2;color:var(--bad)}
    .recognized{font-weight:700}
    .coach-list{margin:8px 0 0;padding-left:18px;color:var(--muted)}

    /* Empty */
    .empty{padding:30px;text-align:center;color:var(--muted)}
    
    /* Tooltip */
    .timestamp{font-size:10px;color:var(--muted)}

    @media(min-width:600px){
      .cards{grid-template-columns:repeat(auto-fill,minmax(175px,1fr))}
      main{padding:16px}
      .card .sym{font-size:34px}
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>🗣 48音标跟学</h1>
    <button id="toggleVideo" class="accent">隐藏视频</button>
  </header>

  <!-- Video -->
  <div class="video-wrap" id="videoWrap">
    <div class="video-panel" id="videoPanel">
      <a id="videoLink" href="https://www.youtube.com/watch?v=g-kzzz8sPS0" target="_blank" rel="noopener">在 YouTube 打开原视频</a>
      <p>这个视频不能稳定内嵌在本地页面里播放。软件负责音标卡、测验和时间点；视频原声直接跳到 YouTube 对应片段。</p>
    </div>
    <div class="now-badge hidden" id="nowBadge">/i:/</div>
  </div>

  <!-- Tabs -->
  <nav class="tabs">
    <button class="active" data-view="learn">📖 音标卡</button>
    <button data-view="practice">🎙 发音练习</button>
    <button data-view="quiz">✏️ 测验</button>
    <button data-view="mistakes">📝 错题</button>
  </nav>

  <!-- Content -->
  <main>
    <section class="view active" id="learnView">
      <div class="stats">
        <div class="stat"><strong id="learnedN">0</strong><span>已掌握</span></div>
        <div class="stat"><strong id="scoreN">0</strong><span>答对</span></div>
        <div class="stat"><strong id="nowName">-</strong><span>正在讲</span></div>
      </div>
      <div class="filters">
        <button class="active" data-filter="all">全部</button>
        <button data-filter="monophthong">单元音</button>
        <button data-filter="diphthong">双元音</button>
        <button data-filter="voiceless">清辅音</button>
        <button data-filter="voiced">浊辅音</button>
      </div>
      <input class="search" id="search" placeholder="搜索音标或例词...">
      <div class="cards" id="cards"></div>
    </section>

    <section class="view" id="practiceView">
      <div class="practice-card">
        <div class="practice-top">
          <div>
            <div class="practice-symbol" id="practiceSym">/i:/</div>
            <div class="practice-word" id="practiceWord">see</div>
            <div class="practice-sentence" id="practiceSentence">I can see it clearly.</div>
          </div>
          <select class="practice-select" id="practiceSelect"></select>
        </div>
        <p id="practiceTip" class="tip">嘴角向两边拉开，舌位高，声音拉长。</p>
        <div class="practice-actions">
          <a id="practiceVideo" class="accent" href="https://www.youtube.com/watch?v=g-kzzz8sPS0" target="_blank" rel="noopener">看视频原声</a>
          <button id="recordBtn">开始录音评分</button>
          <button id="nextPractice">下一个音标</button>
          <button id="markPractice">标记掌握</button>
        </div>
        <div class="score-box">
          <div class="score-circle" id="scoreCircle">--</div>
          <div>
            <div>识别结果：<span class="recognized" id="recognizedText">还没有录音</span></div>
            <div id="scoreText" class="mini">点击“开始录音评分”，清楚读出上面的例词。</div>
            <ul class="coach-list" id="coachList"></ul>
          </div>
        </div>
      </div>
    </section>

    <section class="view" id="quizView">
      <div class="quiz-sym" id="quizSym">/i:/</div>
      <button id="speakQuiz" style="display:block;margin:0 auto 12px;padding:8px 16px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);cursor:pointer">▶ 看视频讲解</button>
      <div class="quiz-choices" id="quizChoices"></div>
      <div class="quiz-fb" id="quizFb"></div>
      <button id="nextQuiz" style="display:block;margin:10px auto;padding:10px 24px;background:var(--accent);color:#fff;border:0;border-radius:var(--r);cursor:pointer;font-size:15px">下一题 ▶</button>
    </section>

    <section class="view" id="mistakesView">
      <h2>错题复习</h2>
      <button id="clearMistakes" style="margin-bottom:10px;padding:6px 12px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);cursor:pointer">清空错题</button>
      <div class="cards" id="mistakeCards"></div>
    </section>
  </main>
</div>

<script>
// ═══ Data: 48 phonemes with auto-detected timestamps from video storyboard ═══
// Timestamps detected by comparing 171 storyboard thumbnails at ~10s intervals.
// Accuracy: ±10 seconds. Adjust videoTime values after watching the video.
const phonemes = [
  // Monophthongs (单元音 12)
  {s:"/i:/",g:"monophthong",t:"vowel",n:"长元音",eg:["see","tea","meet"],tip:"嘴角向两边拉开，舌位高，声音拉长",vt:79},
  {s:"/ɪ/",g:"monophthong",t:"vowel",n:"短元音",eg:["sit","big","fish"],tip:"比 /i:/ 短而松，嘴不要咧太开",vt:118},
  {s:"/e/",g:"monophthong",t:"vowel",n:"短元音",eg:["bed","head","pen"],tip:"嘴半开，舌尖轻触下齿，声音短促",vt:148},
  {s:"/æ/",g:"monophthong",t:"vowel",n:"短元音",eg:["cat","map","bad"],tip:"嘴张大，舌前部抬起，像中文\"哎\"但更开",vt:178},
  {s:"/ɑ:/",g:"monophthong",t:"vowel",n:"长元音",eg:["car","father","park"],tip:"口腔打开，舌位低，声音自然拉长",vt:207},
  {s:"/ɒ/",g:"monophthong",t:"vowel",n:"短元音",eg:["hot","dog","box"],tip:"英式常见，嘴圆而短；美式常接近 /ɑ:/",vt:237},
  {s:"/ɔ:/",g:"monophthong",t:"vowel",n:"长元音",eg:["law","talk","more"],tip:"双唇收圆，喉咙放松，声音拉长",vt:257},
  {s:"/ʊ/",g:"monophthong",t:"vowel",n:"短元音",eg:["book","good","put"],tip:"嘴唇微圆，短而放松，不要发成中文\"乌\"",vt:276},
  {s:"/u:/",g:"monophthong",t:"vowel",n:"长元音",eg:["food","blue","moon"],tip:"双唇收圆，舌后部抬高，声音拉长",vt:306},
  {s:"/ʌ/",g:"monophthong",t:"vowel",n:"短元音",eg:["cup","sun","love"],tip:"嘴自然张开，短促有力，别拖长",vt:326},
  {s:"/ɜ:/",g:"monophthong",t:"vowel",n:"长元音",eg:["bird","word","learn"],tip:"舌中部抬起，口型稳定。英式不卷舌",vt:356},
  {s:"/ə/",g:"monophthong",t:"vowel",n:"弱读音",eg:["about","teacher","sofa"],tip:"最放松的中性音，出现在非重读音节",vt:395},
  // Diphthongs (双元音 8)
  {s:"/eɪ/",g:"diphthong",t:"vowel",n:"双元音",eg:["day","name","take"],tip:"从 /e/ 滑向 /ɪ/，嘴形由半开到收小",vt:425},
  {s:"/aɪ/",g:"diphthong",t:"vowel",n:"双元音",eg:["time","my","like"],tip:"从大开口滑向 /ɪ/，后半段轻收",vt:455},
  {s:"/ɔɪ/",g:"diphthong",t:"vowel",n:"双元音",eg:["boy","coin","voice"],tip:"先圆唇，再滑向 /ɪ/，两个动作连起来",vt:484},
  {s:"/əʊ/",g:"diphthong",t:"vowel",n:"双元音",eg:["go","home","boat"],tip:"英式从 /ə/ 滑向 /ʊ/；美式常写作 /oʊ/",vt:504},
  {s:"/aʊ/",g:"diphthong",t:"vowel",n:"双元音",eg:["now","house","mouth"],tip:"大开口起音，滑向圆唇",vt:534},
  {s:"/ɪə/",g:"diphthong",t:"vowel",n:"双元音",eg:["ear","near","idea"],tip:"从 /ɪ/ 滑向 /ə/，结尾放松",vt:553},
  {s:"/eə/",g:"diphthong",t:"vowel",n:"双元音",eg:["air","care","where"],tip:"从 /e/ 滑向 /ə/，嘴逐渐放松",vt:573},
  {s:"/ʊə/",g:"diphthong",t:"vowel",n:"双元音",eg:["tour","poor","sure"],tip:"从 /ʊ/ 滑向 /ə/，现代口音中有时并入 /ɔ:/",vt:603},
  // Plosives (爆破音 6)
  {s:"/p/",g:"voiceless",t:"consonant",n:"清辅音",eg:["pen","cap","happy"],tip:"双唇闭合后爆破，声带不振动",vt:623},
  {s:"/b/",g:"voiced",t:"consonant",n:"浊辅音",eg:["boy","cab","baby"],tip:"动作像 /p/，但声带振动",vt:642},
  {s:"/t/",g:"voiceless",t:"consonant",n:"清辅音",eg:["tea","cat","city"],tip:"舌尖抵上齿龈后弹开，声带不振动",vt:662},
  {s:"/d/",g:"voiced",t:"consonant",n:"浊辅音",eg:["day","red","ready"],tip:"动作像 /t/，但声带振动",vt:682},
  {s:"/k/",g:"voiceless",t:"consonant",n:"清辅音",eg:["key","back","school"],tip:"舌后部抵软腭后爆破，声带不振动",vt:702},
  {s:"/ɡ/",g:"voiced",t:"consonant",n:"浊辅音",eg:["go","bag","again"],tip:"动作像 /k/，但声带振动",vt:731},
  // Fricatives (摩擦音 9)
  {s:"/f/",g:"voiceless",t:"consonant",n:"清辅音",eg:["fan","life","coffee"],tip:"上齿轻碰下唇，气流摩擦通过",vt:761},
  {s:"/v/",g:"voiced",t:"consonant",n:"浊辅音",eg:["very","give","seven"],tip:"动作像 /f/，但声带振动",vt:781},
  {s:"/θ/",g:"voiceless",t:"consonant",n:"清辅音",eg:["think","bath","three"],tip:"舌尖轻放上下齿之间，气流通过",vt:801},
  {s:"/ð/",g:"voiced",t:"consonant",n:"浊辅音",eg:["this","mother","they"],tip:"动作像 /θ/，但声带振动",vt:830},
  {s:"/s/",g:"voiceless",t:"consonant",n:"清辅音",eg:["see","bus","city"],tip:"舌尖靠近上齿龈，气流细而清",vt:880},
  {s:"/z/",g:"voiced",t:"consonant",n:"浊辅音",eg:["zoo","rose","busy"],tip:"动作像 /s/，但声带振动",vt:929},
  {s:"/ʃ/",g:"voiceless",t:"consonant",n:"清辅音",eg:["she","fish","nation"],tip:"嘴唇略圆，舌面抬起，像轻柔的\"嘘\"",vt:959},
  {s:"/ʒ/",g:"voiced",t:"consonant",n:"浊辅音",eg:["vision","measure","garage"],tip:"动作像 /ʃ/，但声带振动",vt:1008},
  {s:"/h/",g:"voiceless",t:"consonant",n:"清辅音",eg:["he","home","behind"],tip:"喉部送气，口型跟后面的元音走",vt:1048},
  {s:"/r/",g:"voiced",t:"consonant",n:"浊辅音",eg:["red","right","around"],tip:"舌尖上卷或后缩，不要碰到上颚",vt:1058},
  // Affricates (破擦音 6)
  {s:"/tʃ/",g:"voiceless",t:"consonant",n:"清辅音",eg:["chair","watch","teacher"],tip:"先堵住再摩擦释放，类似\"吃\"但更短",vt:1068},
  {s:"/dʒ/",g:"voiced",t:"consonant",n:"浊辅音",eg:["job","age","orange"],tip:"动作像 /tʃ/，但声带振动",vt:1117},
  {s:"/tr/",g:"voiceless",t:"consonant",n:"清辅音",eg:["tree","train","try"],tip:"/t/ 后快速接 /r/，不要拆成两个很慢的音",vt:1147},
  {s:"/dr/",g:"voiced",t:"consonant",n:"浊辅音",eg:["dream","drive","drink"],tip:"/d/ 后快速接 /r/，声带振动",vt:1177},
  {s:"/ts/",g:"voiceless",t:"consonant",n:"清辅音",eg:["cats","gets","lights"],tip:"/t/ 和 /s/ 连续释放，常见于复数结尾",vt:1196},
  {s:"/dz/",g:"voiced",t:"consonant",n:"浊辅音",eg:["beds","cards","friends"],tip:"/d/ 和 /z/ 连续释放，结尾别吞掉",vt:1226},
  // Nasals/Lateral/Approximants (鼻音/舌侧/半元音 6)
  {s:"/m/",g:"voiced",t:"consonant",n:"鼻音",eg:["man","home","summer"],tip:"双唇闭合，声音从鼻腔出来",vt:1266},
  {s:"/n/",g:"voiced",t:"consonant",n:"鼻音",eg:["no","ten","dinner"],tip:"舌尖抵上齿龈，声音从鼻腔出来",vt:1285},
  {s:"/ŋ/",g:"voiced",t:"consonant",n:"鼻音",eg:["sing","long","English"],tip:"舌后部抬起，常在 ng 里出现",vt:1305},
  {s:"/l/",g:"voiced",t:"consonant",n:"舌侧音",eg:["light","milk","hello"],tip:"舌尖抵上齿龈，气流从舌两侧通过",vt:1335},
  {s:"/j/",g:"voiced",t:"consonant",n:"半元音",eg:["yes","you","yellow"],tip:"像很轻的\"耶\"起头，快速滑向后面的元音",vt:1384},
  {s:"/w/",g:"voiced",t:"consonant",n:"半元音",eg:["we","water","quick"],tip:"双唇收圆后迅速打开，别发成 /v/",vt:1414},
];

// ═══ State ═══
const state = {
  filter: 'all', search: '', currentPhonemeIdx: -1,
  learned: new Set(JSON.parse(localStorage.getItem('ph48learned')||'[]')),
  mistakes: JSON.parse(localStorage.getItem('ph48mistakes')||'[]'),
  score: +localStorage.getItem('ph48score')||0,
  practiceIdx: +localStorage.getItem('ph48practiceIdx') || 0,
  quizQ: null, quizDone: false
};
const $ = id => document.getElementById(id);

function save() {
  localStorage.setItem('ph48learned', JSON.stringify([...state.learned]));
  localStorage.setItem('ph48mistakes', JSON.stringify(state.mistakes));
  localStorage.setItem('ph48score', String(state.score));
}

function fmtTime(s) { const m=Math.floor(s/60), sec=s%60; return `${m}:${String(sec).padStart(2,'0')}` }
function youtubeUrl(t=0) { return `https://www.youtube.com/watch?v=g-kzzz8sPS0&t=${Math.max(0, Math.floor(t))}s`; }
function updateVideoPanel(t=0, idx=-1) {
  const link = $('videoLink');
  if (!link) return;
  link.href = youtubeUrl(t);
  link.textContent = idx >= 0
    ? `在 YouTube 播放 ${phonemes[idx].s} 片段（${fmtTime(t)}）`
    : `在 YouTube 打开原视频`;
}

function sentenceFor(p) {
  const word = p.eg[0];
  const map = {
    "see":"I can see it clearly.",
    "sit":"Please sit here.",
    "bed":"The bed is ready.",
    "cat":"The cat is on the map.",
    "day":"Have a good day.",
    "time":"It is time to try.",
    "boy":"The boy has a voice.",
    "pen":"Put the pen on the desk.",
    "think":"Think before you speak.",
    "this":"This is the sound.",
    "red":"Read the red word.",
    "yes":"Yes, you can say it.",
    "we":"We will practise again."
  };
  return map[word] || `Say the word "${word}" clearly.`;
}

function adviceFor(p, score, heard) {
  const advice = [];
  advice.push(p.tip);
  if (score >= 85) {
    advice.push('识别结果接近目标。继续保持同样口型，再跟视频原声读两遍。');
    return advice;
  }
  const symbol = p.s;
  const specific = {
    "/i:/":"声音要拉长，嘴角向两边展开；不要读成短促的 /ɪ/。",
    "/ɪ/":"放松一点，短一点；不要咧嘴太大，也不要拖长。",
    "/æ/":"嘴巴要明显张开，介于中文“啊”和“哎”之间。",
    "/ʊ/":"嘴唇微圆但不要太用力，声音短，不要读成中文“乌”。",
    "/u:/":"双唇收圆，声音拉长，注意和 /ʊ/ 区分。",
    "/θ/":"舌尖轻放在上下齿之间送气，不要读成 /s/。",
    "/ð/":"舌位像 /θ/，但声带要振动，常见于 this、they。",
    "/v/":"上齿轻触下唇并振动声带，不要读成 /w/。",
    "/w/":"先圆唇再打开，不要让上齿碰下唇。",
    "/r/":"舌尖上卷或后缩，不要碰到上颚，不要读成中文“日”。",
    "/l/":"舌尖顶住上齿龈，气流从舌两侧出来。"
  };
  if (specific[symbol]) advice.push(specific[symbol]);
  if (!heard) advice.push('没有识别到有效英文。靠近麦克风，单独读一个例词，不要读整句。');
  else advice.push(`刚才识别成“${heard}”。先只读例词“${p.eg[0]}”，速度放慢，读完停一下。`);
  return advice;
}

function levenshtein(a, b) {
  a = a.toLowerCase(); b = b.toLowerCase();
  const dp = Array.from({length:a.length+1}, () => Array(b.length+1).fill(0));
  for (let i=0;i<=a.length;i++) dp[i][0]=i;
  for (let j=0;j<=b.length;j++) dp[0][j]=j;
  for (let i=1;i<=a.length;i++) {
    for (let j=1;j<=b.length;j++) {
      dp[i][j] = Math.min(
        dp[i-1][j] + 1,
        dp[i][j-1] + 1,
        dp[i-1][j-1] + (a[i-1] === b[j-1] ? 0 : 1)
      );
    }
  }
  return dp[a.length][b.length];
}

function scorePronunciation(heard, p) {
  const clean = (heard || '').toLowerCase().replace(/[^a-z\s']/g, ' ').replace(/\s+/g, ' ').trim();
  if (!clean) return 0;
  const tokens = clean.split(' ');
  let best = 0;
  for (const target of p.eg) {
    const t = target.toLowerCase();
    if (tokens.includes(t)) best = Math.max(best, 96);
    for (const token of tokens) {
      const distance = levenshtein(token, t);
      const similarity = Math.max(0, 1 - distance / Math.max(token.length, t.length));
      best = Math.max(best, Math.round(similarity * 88));
    }
  }
  return best;
}

function setScore(score, heard, p) {
  const circle = $('scoreCircle');
  circle.textContent = score ? String(score) : '--';
  circle.className = 'score-circle ' + (score >= 85 ? 'good' : score >= 65 ? 'mid' : score > 0 ? 'bad' : '');
  $('recognizedText').textContent = heard || '没有识别到';
  $('scoreText').textContent = score >= 85
    ? '通过。可以继续下一个音标。'
    : score >= 65
      ? '接近了，但还需要按提示微调口型。'
      : '差距较大。先看视频原声，再慢速读例词。';
  $('coachList').innerHTML = adviceFor(p, score, heard).map(item => `<li>${item}</li>`).join('');
}

function renderPractice(idx = state.practiceIdx) {
  idx = Math.max(0, Math.min(phonemes.length - 1, idx));
  state.practiceIdx = idx;
  localStorage.setItem('ph48practiceIdx', String(idx));
  const p = phonemes[idx];
  $('practiceSym').textContent = p.s;
  $('practiceWord').textContent = p.eg[0];
  $('practiceSentence').textContent = sentenceFor(p);
  $('practiceTip').textContent = p.tip;
  $('practiceVideo').href = youtubeUrl(Math.max(0, p.vt - 2));
  $('practiceVideo').textContent = `看视频原声 ${fmtTime(Math.max(0, p.vt - 2))}`;
  $('practiceSelect').innerHTML = phonemes.map((item, i) => `<option value="${i}">${item.s} · ${item.eg[0]}</option>`).join('');
  $('practiceSelect').value = String(idx);
  $('markPractice').textContent = state.learned.has(p.s) ? '已掌握' : '标记掌握';
  setScore(0, '', p);
}

// ═══ Video link sync ═══
let lastPhonemeIdx = -1;

function seekTo(idx) {
  const t = Math.max(0, phonemes[idx].vt - 2);
  state.currentPhonemeIdx = idx;
  lastPhonemeIdx = idx;
  updateVideoPanel(t, idx);
  updateNowBadge();
  updateCards();
  $('nowName').textContent = phonemes[idx].s;
  window.open(youtubeUrl(t), '_blank', 'noopener');
  // Scroll card into view
  const card = document.querySelector(`.card[data-idx="${idx}"]`);
  if (card) card.scrollIntoView({behavior:'smooth',block:'center'});
}

function updateNowBadge() {
  const badge = $('nowBadge');
  if (state.currentPhonemeIdx >= 0) {
    badge.textContent = phonemes[state.currentPhonemeIdx].s;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }
}

// ═══ Cards ═══
function visible() {
  const q = state.search.trim().toLowerCase();
  return phonemes.filter(p => {
    if (state.filter !== 'all' && p.g !== state.filter) return false;
    if (q && ![p.s,p.n,p.tip,...p.eg].join(' ').toLowerCase().includes(q)) return false;
    return true;
  });
}

function updateCards() {
  const items = visible();
  $('cards').innerHTML = items.length ? items.map((p,i) => {
    const realIdx = phonemes.indexOf(p);
    const isNow = realIdx === state.currentPhonemeIdx;
    return `<div class="card${isNow?' now':''}" data-idx="${realIdx}" data-action="seek">
      <span class="tag ${p.t}">${p.n}</span>
      <div class="sym">${p.s}</div>
      <div class="eg">${p.eg.join(' · ')}</div>
      <div class="tip">${p.tip}</div>
      <span class="timestamp">⏱ ${fmtTime(p.vt)}</span>
      <div class="acts">
        <button data-action="seek" data-idx="${realIdx}">▶ 视频原声</button>
        <button data-action="practice" data-idx="${realIdx}">🎙 练发音</button>
        <button data-action="learn" data-idx="${realIdx}">${state.learned.has(p.s)?'✓已掌握':'标记掌握'}</button>
      </div>
    </div>`;
  }).join('') : '<div class="empty">没有匹配的音标</div>';
}

// ═══ Quiz ═══
function makeQuiz() {
  const answer = phonemes[Math.floor(Math.random()*phonemes.length)];
  const wrongs = phonemes.filter(p=>p.s!==answer.s).sort(()=>Math.random()-.5).slice(0,3);
  state.quizQ = {answer, choices:[answer,...wrongs].sort(()=>Math.random()-.5)};
  state.quizDone = false;
  $('quizSym').textContent = state.quizQ.answer.s;
  $('quizChoices').innerHTML = state.quizQ.choices.map(p =>
    `<button data-choice="${p.s}"><strong>${p.eg[0]}</strong><br><small>${p.eg.slice(1).join('·')}｜${p.tip}</small></button>`
  ).join('');
  $('quizFb').textContent = '';
}

function answerQuiz(sym) {
  if (state.quizDone || !state.quizQ) return;
  state.quizDone = true;
  const right = sym === state.quizQ.answer.s;
  document.querySelectorAll('#quizChoices button').forEach(b => {
    if (b.dataset.choice === state.quizQ.answer.s) b.classList.add('correct');
    if (b.dataset.choice === sym && !right) b.classList.add('wrong');
  });
  if (right) {
    state.score++;
    state.learned.add(state.quizQ.answer.s);
    $('quizFb').innerHTML = '<span style="color:var(--good)">✅ 答对了！</span>';
  } else {
    state.mistakes.unshift({symbol:state.quizQ.answer.s, at:new Date().toISOString()});
    state.mistakes = state.mistakes.slice(0,60);
    $('quizFb').innerHTML = `<span style="color:var(--bad)">❌ ${state.quizQ.answer.s} → ${state.quizQ.answer.eg[0]}</span>`;
  }
  save();
  updateStats();
}

// ═══ Mistakes ═══
function updateMistakes() {
  if (!state.mistakes.length) {
    $('mistakeCards').innerHTML = '<div class="empty">暂无错题</div>';
    return;
  }
  const uniq = [...new Map(state.mistakes.map(m=>[m.symbol,m])).values()];
  $('mistakeCards').innerHTML = uniq.map(m => {
    const p = phonemes.find(x=>x.s===m.symbol);
    if (!p) return '';
    const idx = phonemes.indexOf(p);
    return `<div class="card" data-idx="${idx}" data-action="seek">
      <span class="tag ${p.t}">${p.n}</span>
      <div class="sym">${p.s}</div>
      <div class="eg">${p.eg.join(' · ')}</div>
      <div class="tip">${p.tip}</div>
      <div class="acts">
        <button data-action="seek" data-idx="${idx}">▶ 视频讲解</button>
      </div>
    </div>`;
  }).join('');
}

// ═══ Stats ═══
function updateStats() {
  $('learnedN').textContent = state.learned.size;
  $('scoreN').textContent = state.score;
}

// ═══ Events ═══
document.addEventListener('click', e => {
  const btn = e.target.closest('button,[data-action]');
  if (!btn) return;
  
  // Tab switch
  if (btn.dataset.view) {
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b===btn));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    $(btn.dataset.view+'View').classList.add('active');
      if (btn.dataset.view==='quiz' && !state.quizQ) makeQuiz();
      if (btn.dataset.view==='mistakes') updateMistakes();
      if (btn.dataset.view==='practice') renderPractice();
      return;
  }
  
  // Filter
  if (btn.dataset.filter !== undefined) {
    state.filter = btn.dataset.filter;
    document.querySelectorAll('.filters button').forEach(b=>b.classList.toggle('active',b.dataset.filter===state.filter));
    updateCards();
    return;
  }
  
  // Seek
  const idx = btn.dataset.idx!==undefined ? +btn.dataset.idx : 
              (btn.closest('[data-idx]') ? +btn.closest('[data-idx]').dataset.idx : null);
  
  if (btn.dataset.action==='practice' && idx!==null && !isNaN(idx)) {
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.view==='practice'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    $('practiceView').classList.add('active');
    renderPractice(idx);
    return;
  }

  if (btn.dataset.action==='seek' || (btn.closest('.card') && !btn.dataset.action)) {
    if (idx!==null && !isNaN(idx)) {
      // Switch to learn view
      document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.view==='learn'));
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      $('learnView').classList.add('active');
      seekTo(idx);
    }
    return;
  }
  
  if (btn.dataset.action==='learn' && idx!==null) {
    if (state.learned.has(phonemes[idx].s)) state.learned.delete(phonemes[idx].s);
    else state.learned.add(phonemes[idx].s);
    save();
    updateStats();
    updateCards();
  }
  
  // Quiz
  if (btn.dataset.choice) answerQuiz(btn.dataset.choice);
});

$('search').addEventListener('input', e => { state.search = e.target.value; updateCards(); });
$('nextQuiz').addEventListener('click', makeQuiz);
$('speakQuiz').addEventListener('click', ()=>{
  if (state.quizQ) seekTo(phonemes.indexOf(state.quizQ.answer));
});
$('practiceSelect').addEventListener('change', e => renderPractice(+e.target.value));
$('nextPractice').addEventListener('click', () => renderPractice((state.practiceIdx + 1) % phonemes.length));
$('markPractice').addEventListener('click', () => {
  const p = phonemes[state.practiceIdx];
  if (state.learned.has(p.s)) state.learned.delete(p.s);
  else state.learned.add(p.s);
  save();
  updateStats();
  updateCards();
  renderPractice(state.practiceIdx);
});
$('recordBtn').addEventListener('click', () => {
  const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const p = phonemes[state.practiceIdx];
  if (!Recognition) {
    setScore(0, '', p);
    $('scoreText').textContent = '当前浏览器不支持语音识别。请用 Chrome 或 Safari 打开这个页面再评分。';
    $('coachList').innerHTML = `<li>仍然可以看视频原声和按口型提示练习。</li>`;
    return;
  }
  const recognition = new Recognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 3;
  $('recordBtn').textContent = '正在听...';
  $('recognizedText').textContent = '请读例词：' + p.eg[0];
  recognition.onresult = event => {
    const heard = Array.from(event.results[0]).map(item => item.transcript).join(' / ');
    const score = scorePronunciation(heard, p);
    setScore(score, heard, p);
    if (score >= 85) {
      state.learned.add(p.s);
      save();
      updateStats();
      updateCards();
      $('markPractice').textContent = '已掌握';
    }
  };
  recognition.onerror = () => {
    setScore(0, '', p);
    $('scoreText').textContent = '没有录到清楚的英文。检查麦克风权限，然后只读一个例词。';
  };
  recognition.onend = () => {
    $('recordBtn').textContent = '开始录音评分';
  };
  recognition.start();
});
$('toggleVideo').addEventListener('click', ()=>{
  const wrap = $('videoWrap');
  const hidden = wrap.style.display === 'none';
  wrap.style.display = hidden ? '' : 'none';
  $('toggleVideo').textContent = hidden ? '隐藏视频' : '显示视频';
  $('toggleVideo').classList.toggle('accent', hidden);
});
$('clearMistakes').addEventListener('click', ()=>{
  if (!confirm('确认清空所有错题？')) return;
  state.mistakes = [];
  save();
  updateMistakes();
});

// ═══ Init ═══
updateStats();
updateCards();
renderPractice();
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations()
    .then(registrations => registrations.forEach(registration => registration.unregister()))
    .catch(()=>{});
}
</script>
</body>
</html>
