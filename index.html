<!doctype html><html lang=zh-CN><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>48音标跟练</title><link rel=manifest href=manifest.json><meta name=theme-color content=#0f172a><meta name=apple-mobile-web-app-capable content=yes><meta name=apple-mobile-web-app-status-bar-style content=black-translucent><meta name=apple-mobile-web-app-title content=48音标><link rel=apple-touch-icon href=icon-192.png><style>
:root{--bg:#f6f7f2;--ink:#202426;--mu:#667071;--ln:#d8ded6;--pn:#fff;--ac:#0f766e;--a2:#c2410c;--a3:#4f46e5;--gd:#15803d;--bd:#b91c1c}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.5;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button,input{font:inherit}
.app{max-width:800px;margin:0 auto;min-height:100vh}
header{padding:8px 12px;background:var(--pn);border-bottom:1px solid var(--ln);position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:6px}
header h1{font-size:17px;margin:0;flex:1}
header button{min-height:30px;padding:4px 10px;border:1px solid var(--ln);border-radius:6px;background:var(--pn);cursor:pointer;font-size:11px}
header button.accent{background:var(--ac);color:#fff;border-color:var(--ac)}
.stat-bar{display:flex;gap:8px;padding:5px 10px;background:#fbfcf8;border-bottom:1px solid var(--ln);font-size:11px;color:var(--mu)}
.stat-bar b{color:var(--ink)}
.filters{display:flex;gap:4px;padding:6px 10px;flex-wrap:wrap;border-bottom:1px solid var(--ln);background:var(--pn)}
.filters button{padding:4px 10px;border:1px solid var(--ln);border-radius:999px;background:var(--pn);cursor:pointer;font-size:11px}
.filters button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.filters .cnt{font-size:9px;opacity:.7}
.search-wrap{padding:6px 10px;background:var(--pn);border-bottom:1px solid var(--ln)}
.search{width:100%;padding:7px 10px;border:1px solid var(--ln);border-radius:6px;background:#fff;font-size:14px}
main{padding:6px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:5px}
.card{padding:10px;background:var(--pn);border:2px solid var(--ln);border-radius:6px;cursor:pointer}
.card.expanded{border-color:var(--ac);grid-column:1/-1}
.card .sym{font-size:26px;font-weight:750;line-height:1.1}
.card .tag{display:inline-block;padding:2px 4px;border-radius:999px;color:#fff;font-size:9px;margin-bottom:2px}
.card .tag.vowel{background:var(--ac)}.card .tag.consonant{background:var(--a2)}
.card .eg{font-size:11px;color:var(--mu);margin:2px 0}
.card .tip{font-size:10px;background:#f0f4ef;padding:3px;border-radius:4px}
.card .acts{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.card .acts button{min-height:24px;padding:2px 7px;font-size:10px;border:1px solid var(--ln);border-radius:4px;background:var(--pn);cursor:pointer}
.detail{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--ln)}
.card.expanded .detail{display:block}
.detail .big-sym{font-size:56px;font-weight:850;text-align:center;line-height:1}
.detail .sentence{text-align:center;font-size:15px;color:var(--ac);margin:4px 0}
.detail .sentence small{display:block;font-size:11px;color:var(--mu)}
.detail video{width:100%;max-width:400px;max-height:200px;background:#000;border-radius:6px;display:block;margin:6px auto}
.detail .pr-row{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.detail .pr-row button{min-height:36px;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;border:0}
.btn-rec{background:var(--bd);color:#fff}.btn-rec.recording{animation:pulse .8s infinite}
.btn-play{background:var(--ac);color:#fff}.btn-cmp{background:var(--a2);color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.detail .rc-st{text-align:center;font-size:12px;min-height:18px}
.detail .fb{text-align:center;padding:6px;border-radius:6px;margin:4px 0;font-size:12px;display:none}
.detail .fb.good{background:#e8f5ec;color:var(--gd);display:block}
.detail .fb.retry{background:#fff3cd;color:#856404;display:block}
.detail .info-box{background:#f0f4ef;padding:6px;border-radius:6px;margin-top:4px}
.detail .info-box h4{font-size:11px;margin:0 0 2px;color:var(--ac)}
.detail .info-box p{font-size:11px;margin:0}
.detail .info-box.warn{background:#fff3cd}.detail .info-box.warn h4{color:var(--a2)}
.qp{display:none;padding:12px;background:var(--pn);border-bottom:1px solid var(--ln)}
.qp.open{display:block}
.qp .qs{font-size:48px;font-weight:800;text-align:center}
.qp .qr{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin:6px 0}
.qp .qr button{padding:8px 12px;border:1px solid var(--ln);border-radius:6px;background:var(--pn);cursor:pointer;font-size:13px;min-width:90px}
.qp .qr button.correct{border-color:var(--gd);background:#e8f5ec}
.qp .qr button.wrong{border-color:var(--bd);background:#fae8e8}
.qp .qf{text-align:center;min-height:20px;font-weight:650;font-size:13px}
.empty{padding:24px;text-align:center;color:var(--mu)}
@media(min-width:600px){.cards{grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:7px}.detail .big-sym{font-size:72px}}
</style></head><body><div class=app>

<main><div class=cards id=cd></div></main>
</div><audio id=ma hidden></audio>

function ch(p){const i=PH.indexOf(p),ex=S.ex===i;return'<div class="card'+(ex?" expanded":"")+'" data-idx="'+i+'"><span class="tag '+p.t+'">'+p.n+'</span><div class=sym>'+p.s+'</div><div class=eg>'+p.eg.join(" · ")+'</div><div class=tip>'+p.er.substring(0,50)+'</div><div class=acts><button data-a=sp data-i='+i+'>🔊 听发音</button><button data-a=ex data-i='+i+'>'+(ex?"收起":"展开练习")+'</button><button data-a=le data-i='+i+'>'+(S.le.has(p.s)?"✓已掌握":"标记")+"</button></div>"+(ex?'<div class=detail><div class=big-sym>'+p.s+'</div><div class=sentence>'+p.se+'<small>例词: '+p.eg.join(" · ")+'</small></div><video src="video.mp4#t='+gt(i)+'" data-ve="'+(i+1<PH.length?PH[i+1].vt:'')+'" controls playsinline preload=none onerror="this.hidden=true" style=width:100%;max-width:400px;max-height:200px;background:#000;border-radius:6px;display:block;margin:6px auto></video><div style=text-align:center;font-size:11px;color:var(--mu);margin:4px 0>⏱ '+fm(gt(i))+' <button data-a=adj data-i='+i+' data-d=-5 style=font-size:10px;padding:2px 6px;border:1px solid var(--ln);border-radius:4px;background:var(--pn);cursor:pointer>-5s</button> <button data-a=adj data-i='+i+' data-d=5 style=font-size:10px;padding:2px 6px;border:1px solid var(--ln);border-radius:4px;background:var(--pn);cursor:pointer>+5s</button>'+((_offs[i]||0)?' <span style=color:var(--a2)>已调'+(_offs[i]>0?'+':'')+_offs[i]+'s</span>':'')+'</div><div class=pr-row><button class=btn-rec data-a=rc data-i='+i+'>🎙 录音</button><button class=btn-play data-a=pm data-i='+i+' disabled>▶ 回听</button><button class=btn-cmp data-a=cp data-i='+i+' disabled>🔄 对比</button></div><div class=pr-row><button data-a=ck data-i='+i+' style=background:var(--a3);color:#fff;border:0;min-height:34px;padding:4px 12px;border-radius:6px;cursor:pointer;font-size:12px>🎯 语音校验</button></div><div class=rc-st data-i='+i+'></div><div class=fb data-i='+i+'></div><div class=info-box><h4>📐 发音要点</h4><p>'+p.ar+'</p></div><div class="info-box warn"><h4>⚠️ 常见错误</h4><p>'+p.er+"</p></div></div>":"")+"</div>"}
function uc(){$("cd").innerHTML=vi().map(ch).join("")||'<div class=empty>没有匹配</div>';bv()}function bv(){document.querySelectorAll("video[data-ve]").forEach(v=>{v.addEventListener("timeupdate",()=>{const e=v.dataset.ve;if(e&&v.currentTime>=+e)v.pause()})})}
function us(){$("ln").textContent=S.le.size;$("sn").textContent=S.sc;$("mn").textContent=S.mi.length}
async function tr(i){if(S.mr&&S.mr.state==="recording"){S.mr.stop();return}S.ch=[];S.au=null;try{const st=await navigator.mediaDevices.getUserMedia({audio:!0});S.mr=new MediaRecorder(st,{mimeType:"audio/webm"});S.mr.ondataavailable=e=>{if(e.data.size>0)S.ch.push(e.data)};S.mr.onstop=()=>{st.getTracks().forEach(t=>t.stop());const b=new Blob(S.ch,{type:"audio/webm"});S.au=URL.createObjectURL(b);$("ma").src=S.au;ub(i,!0);ur(i,"✅ 录音完成")};S.mr.start();ur(i,"🔴 录音中…");ub(i,null,!0)}catch(e){ur(i,"❌ 无法访问麦克风")}}
function ur(i,t){const el=document.querySelector('.rc-st[data-i="'+i+'"]');if(el)el.textContent=t||""}
function ub(i,hr,ir){const c=document.querySelector('.card[data-idx="'+i+'"]');if(!c)return;const pb=c.querySelector('[data-a=pm]'),cb=c.querySelector('[data-a=cp]'),rb=c.querySelector('[data-a=rc]');if(pb)pb.disabled=!hr;if(cb)cb.disabled=!hr;if(rb&&ir!==undefined){rb.textContent=ir?"⏹ 停止":"🎙 录音";rb.classList.toggle("recording",ir)}}
function pm(){if(S.au){$("ma").src=S.au;$("ma").play()}}
function cm(i){if(!S.au)return;const p=PH[i],fb=document.querySelector('.fb[data-i="'+i+'"]');fb.className="fb";fb.style.display="block";fb.textContent="🔊 标准发音…";spk(p.eg[0]);setTimeout(()=>{fb.textContent="🎤 你的录音…";$("ma").src=S.au;$("ma").play();setTimeout(()=>{fb.innerHTML="👂 仔细听差异。⚠️ <b>"+p.er+"</b>"},2500)},2000)}
function ck(i){const p=PH[i],fb=document.querySelector('.fb[data-i="'+i+'"]');if(!("webkitSpeechRecognition"in window)&&!("SpeechRecognition"in window)){fb.className="fb retry";fb.textContent="⚠️ 浏览器不支持语音识别";return}const SR=window.SpeechRecognition||window.webkitSpeechRecognition,rec=new SR();rec.lang="en-US";rec.maxAlternatives=3;fb.className="fb";fb.style.display="block";fb.textContent="🎯 说出: "+p.eg[0]+"…";rec.start();rec.onresult=e=>{const rs=[...Array(e.results[0].length)].map((_,j)=>e.results[0][j].transcript.toLowerCase().trim());const mt=rs.some(r=>r.includes(p.eg[0].toLowerCase()));if(mt){fb.className="fb good";fb.innerHTML="✅ <b>"+p.eg[0]+"</b> 发音可辨识";S.le.add(p.s);sv();us()}else{fb.className="fb retry";fb.innerHTML="⚠️ 识别: <b>"+rs[0]+"</b> 目标: <b>"+p.eg[0]+"</b><br>"+p.er}};rec.onerror=()=>{fb.className="fb retry";fb.textContent="⚠️ 识别失败"}}
function mq(){const a=PH[Math.floor(Math.random()*PH.length)],w=PH.filter(p=>p.s!==a.s).sort(()=>Math.random()-.5).slice(0,3);S.qq={an:a,ch:[a,...w].sort(()=>Math.random()-.5)};S.qd=!1;$("qs").textContent=S.qq.an.s;$("qr").innerHTML=S.qq.ch.map(p=>'<button data-c="'+p.s+'"><b>'+p.eg[0]+"</b><br><small>"+p.eg.slice(1).join("·")+"</small></button>").join("");$("qf").textContent="";$("ql").onclick=()=>spk(S.qq.an.eg[0])}
function aq(sy){if(S.qd||!S.qq)return;S.qd=!0;const r=sy===S.qq.an.s;document.querySelectorAll("#qr button").forEach(b=>{if(b.dataset.c===S.qq.an.s)b.classList.add("correct");if(b.dataset.c===sy&&!r)b.classList.add("wrong")});if(r){S.sc++;S.le.add(S.qq.an.s);$("qf").innerHTML='<span style=color:var(--gd)>✅</span>'}else{S.mi.unshift({symbol:S.qq.an.s,at:new Date().toISOString()});S.mi=S.mi.slice(0,60);$("qf").innerHTML='<span style=color:var(--bd)>❌ '+S.qq.an.s+" → "+S.qq.an.eg[0]+"</span>"}sv();us()}
document.addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;const i=b.dataset.i!==undefined?+b.dataset.i:null;if(b.dataset.f!==undefined){S.fi=b.dataset.f;document.querySelectorAll(".filters button").forEach(x=>x.classList.toggle("active",x.dataset.f===S.fi));S.ex=-1;uc();return}if(i!=null){if(b.dataset.a==="adj")adj(i,+b.dataset.d);if(b.dataset.a==="sp")spk(PH[i].eg[0]);if(b.dataset.a==="ex"){S.ex=S.ex===i?-1:i;uc()}if(b.dataset.a==="le"){if(S.le.has(PH[i].s))S.le.delete(PH[i].s);else S.le.add(PH[i].s);sv();us();uc()}if(b.dataset.a==="rc")tr(i);if(b.dataset.a==="pm")pm();if(b.dataset.a==="cp")cm(i);if(b.dataset.a==="ck")ck(i)}if(b.dataset.c)aq(b.dataset.c);if(b.id==="bq"){$("qp").classList.toggle("open");mq()}if(b.id==="qc")$("qp").classList.remove("open");if(b.id==="qn")mq()});
$("s").addEventListener("input",e=>{S.se=e.target.value;S.ex=-1;uc()});us();uc();
