<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>48音标跟练</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="48音标">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root{--bg:#f6f7f2;--ink:#202426;--mu:#667071;--ln:#d8ded6;--pn:#fff;--ac:#0f766e;--a2:#c2410c;--a3:#4f46e5;--gd:#15803d;--bd:#b91c1c;--r:8px}
    *,*::before,*::after{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.5}
    button,input{font:inherit}
    .app{max-width:800px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

    header{padding:10px 14px;background:var(--pn);border-bottom:1px solid var(--ln);position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:8px}
    header h1{font-size:18px;margin:0;flex:1}
    header button{min-height:32px;padding:5px 10px;border:1px solid var(--ln);border-radius:var(--r);background:var(--pn);cursor:pointer;font-size:12px}
    header button.accent{background:var(--ac);color:#fff;border-color:var(--ac)}

    .stat-bar{display:flex;gap:4px;padding:6px 10px;background:#fbfcf8;border-bottom:1px solid var(--ln);font-size:11px;color:var(--mu);overflow-x:auto}
    .stat-bar span{margin-right:10px;white-space:nowrap}
    .stat-bar b{color:var(--ink)}

    .filters{display:flex;gap:4px;padding:8px 10px;flex-wrap:wrap;border-bottom:1px solid var(--ln);background:var(--pn)}
    .filters button{padding:4px 10px;border:1px solid var(--ln);border-radius:999px;background:var(--pn);cursor:pointer;font-size:11px;white-space:nowrap}
    .filters button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
    .filters button .cnt{font-size:9px;opacity:.7}

    .search-wrap{padding:8px 10px;background:var(--pn);border-bottom:1px solid var(--ln)}
    .search{width:100%;padding:8px 10px;border:1px solid var(--ln);border-radius:var(--r);background:#fff;font-size:14px}

    main{flex:1;padding:8px;overflow-y:auto}

    .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px}
    .card{padding:10px;background:var(--pn);border:1px solid var(--ln);border-radius:var(--r);cursor:pointer;transition:transform .1s,box-shadow .1s}
    .card:active{transform:scale(.97)}
    .card.expanded{border-color:var(--ac);box-shadow:0 0 0 3px rgba(15,118,110,.15);grid-column:1/-1}
    .card .sym{font-size:28px;font-weight:750;line-height:1.1}
    .card .tag{display:inline-block;padding:2px 5px;border-radius:999px;color:#fff;font-size:9px;margin-bottom:3px}
    .card .tag.vowel{background:var(--ac)}.card .tag.consonant{background:var(--a2)}
    .card .eg{font-size:11px;color:var(--mu);margin:3px 0}
    .card .tip{font-size:10px;background:#f0f4ef;padding:4px;border-radius:4px;margin-top:3px}
    .card .acts{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
    .card .acts button{min-height:26px;padding:3px 8px;font-size:10px;border:1px solid var(--ln);border-radius:4px;background:var(--pn);cursor:pointer}

    /* Expanded detail */
    .detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--ln)}
    .card.expanded .detail{display:block}
    .detail .big-sym{font-size:64px;font-weight:850;text-align:center;line-height:1}
    .detail .sentence{text-align:center;font-size:16px;color:var(--ac);margin:6px 0}
    .detail .sentence small{display:block;font-size:11px;color:var(--mu)}
    .detail .practice-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:10px 0}
    .detail .practice-row button{min-height:38px;padding:6px 14px;border-radius:var(--r);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:4px}
    .btn-listen{background:var(--a3);color:#fff;border:0}
    .btn-record{background:var(--bd);color:#fff;border:0}
    .btn-record.recording{animation:pulse .8s infinite}
    .btn-play{background:var(--ac);color:#fff;border:0}
    .btn-compare{background:var(--a2);color:#fff;border:0}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .detail .rec-status{text-align:center;font-size:13px;min-height:20px}
    .detail .fb{text-align:center;padding:8px;border-radius:var(--r);margin:6px 0;font-size:13px;display:none}
    .detail .fb.good{background:#e8f5ec;color:var(--gd);display:block}
    .detail .fb.retry{background:#fff3cd;color:#856404;display:block}
    .detail .info-box{background:#f0f4ef;padding:8px;border-radius:var(--r);margin-top:6px}
    .detail .info-box h4{font-size:12px;margin:0 0 2px;color:var(--ac)}
    .detail .info-box p{font-size:12px;margin:0}
    .detail .info-box.warn{background:#fff3cd}
    .detail .info-box.warn h4{color:var(--a2)}

    /* Quiz panel */
    .quiz-panel{display:none;padding:14px;background:var(--pn);border-bottom:1px solid var(--ln)}
    .quiz-panel.open{display:block}
    .quiz-panel .quiz-sym{font-size:56px;font-weight:800;text-align:center}
    .quiz-panel .qrow{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:8px 0}
    .quiz-panel .qrow button{padding:10px 14px;border:1px solid var(--ln);border-radius:var(--r);background:var(--pn);cursor:pointer;font-size:14px;min-width:100px}
    .quiz-panel .qrow button.correct{border-color:var(--gd);background:#e8f5ec}
    .quiz-panel .qrow button.wrong{border-color:var(--bd);background:#fae8e8}
    .quiz-panel .qfb{text-align:center;min-height:22px;font-weight:650}

    .empty{padding:24px;text-align:center;color:var(--mu)}

    @media(min-width:600px){.cards{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px}.detail .big-sym{font-size:80px}}
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>🗣 48音标跟练</h1>
    <button id="btnQuiz" class="accent">✏️ 测验</button>
  </header>

  <div class="quiz-panel" id="quizPanel">
    <div class="quiz-sym" id="quizSym">/i:/</div>
    <button id="quizSpeak" style="display:block;margin:4px auto;padding:4px 12px;border:1px solid var(--ln);border-radius:var(--r);background:var(--pn);cursor:pointer;font-size:12px">🔊 听发音</button>
    <div class="qrow" id="quizRow"></div>
    <div class="qfb" id="quizFb"></div>
    <button id="quizNext" style="display:block;margin:6px auto;padding:8px 20px;background:var(--ac);color:#fff;border:0;border-radius:var(--r);cursor:pointer;font-size:14px">下一题 ▶</button>
    <button id="quizClose" style="display:block;margin:4px auto;padding:4px 12px;border:0;background:transparent;color:var(--mu);cursor:pointer;font-size:12px">关闭测验</button>
  </div>

  <div class="stat-bar">
    <span>已掌握 <b id="learnedN">0</b></span>
    <span>答对 <b id="scoreN">0</b></span>
    <span>错题 <b id="mistakeN">0</b></span>
  </div>

  <div class="filters">
    <button class="active" data-filter="all">全部<span class="cnt">48</span></button>
    <button data-filter="monophthong">单元音<span class="cnt">12</span></button>
    <button data-filter="diphthong">双元音<span class="cnt">8</span></button>
    <button data-filter="voiceless">清辅音<span class="cnt">16</span></button>
    <button data-filter="voiced">浊辅音<span class="cnt">12</span></button>
  </div>

  <div class="search-wrap"><input class="search" id="search" placeholder="搜索音标、例词…"></div>

  <main>
    <div class="cards" id="cards"></div>
  </main>
</div>
<audio id="myAudio" style="display:none"></audio>

<script>
// ═══ 48 Phonemes ═══
const phonemes = [
  {s:"/i:/",g:"monophthong",t:"vowel",n:"长元音",eg:["see","tea","meet"],sentence:"She sees the sea on the beach.",art:"舌前部抬高靠近硬腭，嘴角用力向两边拉开，声音拉长。",err:"别发成中文'衣'——嘴角要拉得更开，舌位更高。"},
  {s:"/ɪ/",g:"monophthong",t:"vowel",n:"短元音",eg:["sit","big","fish"],sentence:"Sit in the big city.",art:"比 /i:/ 稍低稍松，嘴角微咧但不拉太开。短促有力。",err:"别和 /i:/ 搞混——'sheep'是羊，'ship'是船，嘴松一点就对了。"},
  {s:"/e/",g:"monophthong",t:"vowel",n:"短元音",eg:["bed","head","pen"],sentence:"Let me get a red pen.",art:"嘴半张开，舌尖轻触下齿。声音短促。",err:"不要发成中文'爱'——嘴巴不要张太大，声音要干脆。"},
  {s:"/æ/",g:"monophthong",t:"vowel",n:"短元音",eg:["cat","map","bad"],sentence:"The black cat sat on the mat.",art:"嘴张大！下颚下沉，舌前部抬起。是所有前元音里开口最大的。",err:"很多中国人发成 /e/——要把嘴张大到能塞两根手指。"},
  {s:"/ɑ:/",g:"monophthong",t:"vowel",n:"长元音",eg:["car","father","park"],sentence:"My father parked the car far away.",art:"口腔完全打开，舌位放到最低，声音从喉咙深处发出，拉长。",err:"美式常带 r 色彩，英式不卷舌。根据你学的口音选择。"},
  {s:"/ɒ/",g:"monophthong",t:"vowel",n:"短元音",eg:["hot","dog","box"],sentence:"The hot dog is in the box.",art:"嘴唇收圆，舌后部抬起，声音短促。主要是英式发音。",err:"美式里这个音常变成 /ɑ:/，所以 'hot' 英美发音不同。"},
  {s:"/ɔ:/",g:"monophthong",t:"vowel",n:"长元音",eg:["law","talk","more"],sentence:"I saw more laws on the door.",art:"双唇充分收圆，像吹口哨的嘴型。舌后部抬高，声音拉长。",err:"别发成 /ɒ/ 拉长版——嘴要更圆更紧。"},
  {s:"/ʊ/",g:"monophthong",t:"vowel",n:"短元音",eg:["book","good","put"],sentence:"Put the good book here.",art:"嘴唇微圆、放松，舌后部微抬。短而轻。",err:"不是中文'乌'！嘴唇没那么圆，舌头没那么高。"},
  {s:"/u:/",g:"monophthong",t:"vowel",n:"长元音",eg:["food","blue","moon"],sentence:"The blue moon is cool.",art:"双唇用力收圆、向前突出。舌后部充分抬高。声音拉长。",err:"别发成中文'乌'——嘴唇要更前突、更圆、更紧张。"},
  {s:"/ʌ/",g:"monophthong",t:"vowel",n:"短元音",eg:["cup","sun","love"],sentence:"I love the sunny cup.",art:"嘴自然张开，舌中部微抬。短促有力。",err:"不要发成中文'啊'——嘴不要张太大，声音在口腔中部。"},
  {s:"/ɜ:/",g:"monophthong",t:"vowel",n:"长元音",eg:["bird","word","learn"],sentence:"The bird learned a new word.",art:"舌中部抬起，口型稳定不动。英式不卷舌。",err:"英式不要卷舌，舌尖不要碰到上颚。想象嘴里含着一口水。"},
  {s:"/ə/",g:"monophthong",t:"vowel",n:"弱读音",eg:["about","teacher","sofa"],sentence:"The teacher is about to arrive.",art:"全身最放松的音！嘴微张，舌自然平放。",err:"出现在非重读音节——如 'banana' 首尾的 a。"},
  {s:"/eɪ/",g:"diphthong",t:"vowel",n:"双元音",eg:["day","name","take"],sentence:"Take the train today.",art:"从 /e/ 滑向 /ɪ/。前半段嘴半开，后半段嘴收小。",err:"别发成中文'诶'一个字——要有滑动过程，前重后轻。"},
  {s:"/aɪ/",g:"diphthong",t:"vowel",n:"双元音",eg:["time","my","like"],sentence:"I like my time alone.",art:"从大开口滑向 /ɪ/。前半张嘴张大，后半段迅速收拢。",err:"别发成中文'爱'——开头嘴要更大，收尾要更快。"},
  {s:"/ɔɪ/",g:"diphthong",t:"vowel",n:"双元音",eg:["boy","coin","voice"],sentence:"The boy's voice is full of joy.",art:"从圆唇滑向 /ɪ/，嘴唇由圆变扁，一气呵成。",err:"两个动作要连贯，不要断成'哦-衣'两拍。"},
  {s:"/əʊ/",g:"diphthong",t:"vowel",n:"双元音",eg:["go","home","boat"],sentence:"Go home on the old boat.",art:"从 /ə/ 滑向 /ʊ/，嘴唇由微开到圆。",err:"别发成中文'欧'——英语有滑动过程，中文没有。"},
  {s:"/aʊ/",g:"diphthong",t:"vowel",n:"双元音",eg:["now","house","mouth"],sentence:"Now get out of the house.",art:"大开口起音，迅速滑向圆唇 /ʊ/。",err:"别发成中文'奥'——开头要更大更开。"},
  {s:"/ɪə/",g:"diphthong",t:"vowel",n:"双元音",eg:["ear","near","idea"],sentence:"Can you hear me clearly here?",art:"从 /ɪ/ 滑向 /ə/，由紧到松。",err:"别发成一个音——要听得出从紧到松的过渡。"},
  {s:"/eə/",g:"diphthong",t:"vowel",n:"双元音",eg:["air","care","where"],sentence:"Take care of the air there.",art:"从 /e/ 滑向 /ə/，嘴由半开到放松。",err:"很多口音中这个音正在消失，常被 /ɜ:/ 替代。"},
  {s:"/ʊə/",g:"diphthong",t:"vowel",n:"双元音",eg:["tour","poor","sure"],sentence:"The tour was poor but sure.",art:"从 /ʊ/ 滑向 /ə/，圆唇快速放松。使用场景越来越少。",err:"现代英语中常被 /ɔ:/ 替代（'poor'→/pɔ:/）。"},
  {s:"/p/",g:"voiceless",t:"consonant",n:"清辅音",eg:["pen","cap","happy"],sentence:"Please pick up the happy puppy.",art:"双唇闭合，气流憋住后突然释放。声带不振动。",err:"不要发成中文'泼'——后面没有元音，只有纯粹的爆破。"},
  {s:"/b/",g:"voiced",t:"consonant",n:"浊辅音",eg:["boy","cab","baby"],sentence:"The baby boy loves the blue ball.",art:"动作同 /p/，但声带振动。手摸喉咙能感到震动。",err:"别发成中文'波'——后面不能再带一个元音。"},
  {s:"/t/",g:"voiceless",t:"consonant",n:"清辅音",eg:["tea","cat","city"],sentence:"Tom took the train to the city.",art:"舌尖抵上齿龈，憋气后弹开。声带不振动。",err:"别发成中文'特'——舌头弹开要干脆，不拖尾音。"},
  {s:"/d/",g:"voiced",t:"consonant",n:"浊辅音",eg:["day","red","ready"],sentence:"David had a good day today.",art:"动作同 /t/，但声带振动。",err:"词尾别吞——'bad' vs 'bat'，前者声带振动，后者不振动。"},
  {s:"/k/",g:"voiceless",t:"consonant",n:"清辅音",eg:["key","back","school"],sentence:"Keep the black cat in the school.",art:"舌后部抵软腭，憋气后释放。声带不振动。",err:"别发成中文'科'——后面没有元音，是纯粹的爆破。"},
  {s:"/ɡ/",g:"voiced",t:"consonant",n:"浊辅音",eg:["go","bag","again"],sentence:"Give the big dog a good hug.",art:"动作同 /k/，但声带振动。",err:"词尾别吞——'bag' 不是 'ba'，最后声带要振一下。"},
  {s:"/f/",g:"voiceless",t:"consonant",n:"清辅音",eg:["fan","life","coffee"],sentence:"The fine coffee is for the family.",art:"上齿轻咬下唇，气流从缝隙中摩擦通过。",err:"别咬太紧——不是真的咬嘴唇，只是轻碰。"},
  {s:"/v/",g:"voiced",t:"consonant",n:"浊辅音",eg:["very","give","seven"],sentence:"I love the very clever movie.",art:"动作同 /f/，但声带振动。",err:"中国人常把 /v/ 发成 /w/——'very' 不是 'wery'！"},
  {s:"/θ/",g:"voiceless",t:"consonant",n:"清辅音",eg:["think","bath","three"],sentence:"I think three thanks is enough.",art:"舌尖轻轻放在上下齿之间，气流摩擦通过。",err:"别发成 /s/！'think' 不是 'sink'。舌尖要在牙缝间！"},
  {s:"/ð/",g:"voiced",t:"consonant",n:"浊辅音",eg:["this","mother","they"],sentence:"This is their mother's clothes.",art:"动作同 /θ/，但声带振动。这是英语中最常见的辅音之一。",err:"别发成 /d/ 或 /z/——'this' 不是 'dis'。"},
  {s:"/s/",g:"voiceless",t:"consonant",n:"清辅音",eg:["see","bus","city"],sentence:"She sees six small cats in the city.",art:"舌尖靠近上齿龈但不碰到，气流从窄缝中通过。",err:"不要发成中文'丝'——英语的 s 舌尖更靠后。"},
  {s:"/z/",g:"voiced",t:"consonant",n:"浊辅音",eg:["zoo","rose","busy"],sentence:"The busy bees buzz in the zoo.",art:"动作同 /s/，但声带振动。像蜜蜂嗡嗡声。",err:"词尾的 /z/ 要振动——'is' 不是 'iss'。"},
  {s:"/ʃ/",g:"voiceless",t:"consonant",n:"清辅音",eg:["she","fish","nation"],sentence:"She sells fresh fish in the shop.",art:"嘴唇微圆略突，舌面抬起靠近硬腭。",err:"嘴唇一定要圆！不然 /ʃ/ 会发成 /s/。'she' 不是 'see'。"},
  {s:"/ʒ/",g:"voiced",t:"consonant",n:"浊辅音",eg:["vision","measure","garage"],sentence:"The treasure was a great pleasure.",art:"动作同 /ʃ/，但声带振动。这个音比较少出现。",err:"声带一定要振动——像汉语'日'的声母但嘴唇更圆。"},
  {s:"/h/",g:"voiceless",t:"consonant",n:"清辅音",eg:["he","home","behind"],sentence:"He has a happy home behind the hill.",art:"喉部送气，口型跟随后面的元音变化。",err:"不要太用力——英语的 /h/ 很轻，不像中文'喝'那么重。"},
  {s:"/tʃ/",g:"voiceless",t:"consonant",n:"清辅音",eg:["chair","watch","teacher"],sentence:"The teacher chose a cheap chair.",art:"舌尖抵上齿龈然后释放时带出摩擦。一堵一放一摩擦。",err:"别发成中文'吃'——英语更短更干脆。"},
  {s:"/dʒ/",g:"voiced",t:"consonant",n:"浊辅音",eg:["job","age","orange"],sentence:"John just got a new job in June.",art:"动作同 /tʃ/，但声带振动。",err:"注意声带振动——手摸喉咙有震动才是 /dʒ/。"},
  {s:"/tr/",g:"voiceless",t:"consonant",n:"清辅音",eg:["tree","train","try"],sentence:"Try to travel by train.",art:"/t/ 后立刻接 /r/，像是一个连贯的音。",err:"不要拆成't-rain'两个音——要一口气出来。"},
  {s:"/dr/",g:"voiced",t:"consonant",n:"浊辅音",eg:["dream","drive","drink"],sentence:"I dream of driving and drinking tea.",art:"/d/ 后立刻接 /r/，声带振动。",err:"和 /tr/ 的区别就是声带有无振动。"},
  {s:"/ts/",g:"voiceless",t:"consonant",n:"清辅音",eg:["cats","gets","lights"],sentence:"The cats get lots of lights.",art:"/t/ 和 /s/ 连续释放。常见于复数词尾。",err:"不要拆成两个独立的音——像踩刹车的声音。"},
  {s:"/dz/",g:"voiced",t:"consonant",n:"浊辅音",eg:["beds","cards","friends"],sentence:"My friends put cards on the beds.",art:"/d/ 和 /z/ 连续释放，声带振动。",err:"词尾别吞——'beds' 要有 /dz/ 收尾。"},
  {s:"/m/",g:"voiced",t:"consonant",n:"鼻音",eg:["man","home","summer"],sentence:"My mom made some more money.",art:"双唇闭合，软腭下降，声音完全从鼻腔出来。",err:"嘴唇要闭严——气流不能从嘴里漏出来。"},
  {s:"/n/",g:"voiced",t:"consonant",n:"鼻音",eg:["no","ten","dinner"],sentence:"No one knew the new name.",art:"舌尖抵上齿龈，嘴微张，声音从鼻腔出来。",err:"舌尖必须到位——顶住上齿龈，不能悬空。"},
  {s:"/ŋ/",g:"voiced",t:"consonant",n:"鼻音",eg:["sing","long","English"],sentence:"The king is singing a long song.",art:"舌后部抬起抵软腭，声音从鼻腔出。",err:"不要在 /ŋ/ 后面再加 /ɡ/——'sing' 不是 'sing-g'。"},
  {s:"/l/",g:"voiced",t:"consonant",n:"舌侧音",eg:["light","milk","hello"],sentence:"Let the little girl look at the light.",art:"舌尖抵上齿龈，气流从舌头两侧通过。",err:"词尾 /l/（dark l）舌后部也要抬起——'milk' 的 l 更靠后。"},
  {s:"/j/",g:"voiced",t:"consonant",n:"半元音",eg:["yes","you","yellow"],sentence:"Yes, you used the yellow one yesterday.",art:"舌前部抬高接近硬腭，然后迅速滑向后面的元音。",err:"不要发成中文'耶'——英语的 /j/ 更轻更短。"},
  {s:"/w/",g:"voiced",t:"consonant",n:"半元音",eg:["we","water","quick"],sentence:"We want warm water in the winter.",art:"双唇收圆、前突，然后迅速打开滑向后面的元音。",err:"别发成 /v/！'we' 不是 'vee'——嘴唇要圆不要咬下唇。"},
];

// State
const S={filter:'all',search:'',expandedIdx:-1,learned:new Set(JSON.parse(localStorage.getItem('ph48learned')||'[]')),mistakes:JSON.parse(localStorage.getItem('ph48mistakes')||'[]'),score:+localStorage.getItem('ph48score')||0,quizQ:null,quizDone:false,mr:null,chunks:[],audioURL:null};
const $=id=>document.getElementById(id);
function save(){localStorage.setItem('ph48learned',JSON.stringify([...S.learned]));localStorage.setItem('ph48mistakes',JSON.stringify(S.mistakes));localStorage.setItem('ph48score',String(S.score))}
function speak(t){if(!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=.82;speechSynthesis.speak(u)}

// ═══ Cards ═══
function visible(){const q=S.search.trim().toLowerCase();return phonemes.filter(p=>(S.filter==='all'||p.g===S.filter)&&(!q||[p.s,p.n,p.err,p.sentence,...p.eg].join(' ').toLowerCase().includes(q)))}
function cardHTML(p){
  const i=phonemes.indexOf(p),exp=S.expandedIdx===i;
  return`<div class="card${exp?' expanded':''}" data-idx="${i}">
    <span class="tag ${p.t}">${p.n}</span>
    <div class="sym">${p.s}</div>
    <div class="eg">${p.eg.join(' · ')}</div>
    <div class="tip">${p.err.substring(0,38)}…</div>
    <div class="acts">
      <button data-act="speak" data-idx="${i}">🔊</button>
      <button data-act="expand" data-idx="${i}">${exp?'收起':'🎤 练发音'}</button>
      <button data-act="learn" data-idx="${i}">${S.learned.has(p.s)?'✓已掌握':'标记'}</button>
    </div>
    <div class="detail">
      <div class="big-sym">${p.s}</div>
      <div class="sentence">${p.sentence}<small>例词: ${p.eg.join(' · ')}</small></div>
      <div class="practice-row">
        <button class="btn-listen" data-act="listen" data-idx="${i}">🔊 听标准音</button>
        <button class="btn-record" data-act="record" data-idx="${i}">🎙 录音</button>
        <button class="btn-play" data-act="playmy" data-idx="${i}" disabled>▶ 听我的</button>
        <button class="btn-compare" data-act="compare" data-idx="${i}" disabled>🔄 对比</button>
      </div>
      <div class="practice-row">
        <button data-act="check" data-idx="${i}" style="background:var(--a3);color:#fff;border:0;min-height:36px;padding:5px 14px;border-radius:var(--r);cursor:pointer;font-size:13px">🎯 语音识别校验</button>
      </div>
      <div class="rec-status" data-idx="${i}"></div>
      <div class="fb" data-idx="${i}"></div>
      <div class="info-box"><h4>📐 发音要点</h4><p>${p.art}</p></div>
      <div class="info-box warn"><h4>⚠️ 常见错误</h4><p>${p.err}</p></div>
    </div>
  </div>`;
}

function updateCards(){
  const items=visible();
  $('cards').innerHTML=items.length?items.map(cardHTML).join(''):'<div class="empty">没有匹配的音标</div>';
  $('mistakeN').textContent=S.mistakes.length;
}

function updateStats(){$('learnedN').textContent=S.learned.size;$('scoreN').textContent=S.score;$('mistakeN').textContent=S.mistakes.length}

// ═══ Recording ═══
async function toggleRecord(idx){
  if(S.mr&&S.mr.state==='recording'){S.mr.stop();return}
  S.chunks=[];S.audioURL=null;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    S.mr=new MediaRecorder(stream,{mimeType:'audio/webm'});
    S.mr.ondataavailable=e=>{if(e.data.size>0)S.chunks.push(e.data)};
    S.mr.onstop=()=>{stream.getTracks().forEach(t=>t.stop());const blob=new Blob(S.chunks,{type:'audio/webm'});S.audioURL=URL.createObjectURL(blob);$('myAudio').src=S.audioURL;updateDetailButtons(idx,true);updateRecStatus(idx,'✅ 录音完成！')};
    S.mr.start();updateRecStatus(idx,'🔴 正在录音…说出上面的例句');updateDetailButtons(idx,null,true);
  }catch(e){updateRecStatus(idx,'❌ 无法访问麦克风')}
}

function updateRecStatus(idx,txt){const el=document.querySelector(`.rec-status[data-idx="${idx}"]`);if(el)el.textContent=txt||''}
function updateDetailButtons(idx,hasRecording,isRecording){
  const card=document.querySelector(`.card[data-idx="${idx}"]`);if(!card)return;
  card.querySelector('[data-act="playmy"]').disabled=!hasRecording;
  card.querySelector('[data-act="compare"]').disabled=!hasRecording;
  const recBtn=card.querySelector('[data-act="record"]');
  if(isRecording!==undefined){recBtn.textContent=isRecording?'⏹ 停止':'🎙 录音';recBtn.classList.toggle('recording',isRecording)}
}

function playMyRecording(idx){if(S.audioURL){$('myAudio').src=S.audioURL;$('myAudio').play()}}
function compareRecordings(idx){
  if(!S.audioURL)return;const p=phonemes[idx],fb=document.querySelector(`.fb[data-idx="${idx}"]`);
  fb.className='fb';fb.style.display='block';fb.textContent='🔊 标准发音…';speak(p.eg[0]);
  setTimeout(()=>{fb.textContent='🎤 你的录音…';$('myAudio').src=S.audioURL;$('myAudio').play()},2000);
  setTimeout(()=>{fb.className='fb retry';fb.innerHTML='👂 仔细听差异。<br>⚠️ <b>'+p.err+'</b>'},4500);
}
function checkPronunciation(idx){
  const p=phonemes[idx],fb=document.querySelector(`.fb[data-idx="${idx}"]`);
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){fb.className='fb retry';fb.textContent='⚠️ 你的浏览器不支持语音识别';return}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition,rec=new SR();rec.lang='en-US';rec.maxAlternatives=3;
  fb.className='fb';fb.style.display='block';fb.textContent='🎯 说出: '+p.eg[0]+'…';rec.start();
  rec.onresult=e=>{const results=[...Array(e.results[0].length)].map((_,i)=>e.results[0][i].transcript.toLowerCase().trim());const match=results.some(r=>r.includes(p.eg[0].toLowerCase()));if(match){fb.className='fb good';fb.innerHTML='✅ 识别成功！<b>'+p.eg[0]+'</b> 发音可辨识';S.learned.add(p.s);save();updateStats()}else{fb.className='fb retry';fb.innerHTML='⚠️ 识别为: <b>'+results[0]+'</b>，目标: <b>'+p.eg[0]+'</b><br>'+p.err}};
  rec.onerror=()=>{fb.className='fb retry';fb.textContent='⚠️ 识别失败，请重试'}
}

// ═══ Quiz ═══
function makeQuiz(){const a=phonemes[Math.floor(Math.random()*phonemes.length)],w=phonemes.filter(p=>p.s!==a.s).sort(()=>Math.random()-.5).slice(0,3);S.quizQ={answer:a,choices:[a,...w].sort(()=>Math.random()-.5)};S.quizDone=false;$('quizSym').textContent=S.quizQ.answer.s;$('quizRow').innerHTML=S.quizQ.choices.map(p=>`<button data-choice="${p.s}"><b>${p.eg[0]}</b><br><small>${p.eg.slice(1).join('·')}</small></button>`).join('');$('quizFb').textContent=''}
function answerQuiz(sym){if(S.quizDone||!S.quizQ)return;S.quizDone=true;const right=sym===S.quizQ.answer.s;document.querySelectorAll('#quizRow button').forEach(b=>{if(b.dataset.choice===S.quizQ.answer.s)b.classList.add('correct');if(b.dataset.choice===sym&&!right)b.classList.add('wrong')});if(right){S.score++;S.learned.add(S.quizQ.answer.s);$('quizFb').innerHTML='<span style="color:var(--gd)">✅ 答对了！</span>'}else{S.mistakes.unshift({symbol:S.quizQ.answer.s,at:new Date().toISOString()});S.mistakes=S.mistakes.slice(0,60);$('quizFb').innerHTML='<span style="color:var(--bd)">❌ 正确答案: '+S.quizQ.answer.s+' → '+S.quizQ.answer.eg[0]+'</span>'}save();updateStats()}

// ═══ Events ═══
document.addEventListener('click',e=>{
  const btn=e.target.closest('button,[data-act]');if(!btn)return;
  const idx=btn.dataset.idx!==undefined?+btn.dataset.idx:null;
  // Filter
  if(btn.dataset.filter!==undefined){S.filter=btn.dataset.filter;document.querySelectorAll('.filters button').forEach(b=>b.classList.toggle('active',b.dataset.filter===S.filter));S.expandedIdx=-1;updateCards();return}
  // Card actions
  if(btn.dataset.act==='speak'&&idx!=null)speak(phonemes[idx].eg[0]);
  if(btn.dataset.act==='expand'&&idx!=null){S.expandedIdx=S.expandedIdx===idx?-1:idx;updateCards();if(S.expandedIdx===idx){const card=document.querySelector(`.card[data-idx="${idx}"]`);if(card)card.scrollIntoView({behavior:'smooth',block:'center'})}}
  if(btn.dataset.act==='learn'&&idx!=null){if(S.learned.has(phonemes[idx].s))S.learned.delete(phonemes[idx].s);else S.learned.add(phonemes[idx].s);save();updateStats();updateCards()}
  if(btn.dataset.act==='listen'&&idx!=null){speak(phonemes[idx].sentence);setTimeout(()=>speak(phonemes[idx].eg[0]),2500)}
  if(btn.dataset.act==='record'&&idx!=null)toggleRecord(idx);
  if(btn.dataset.act==='playmy'&&idx!=null)playMyRecording(idx);
  if(btn.dataset.act==='compare'&&idx!=null)compareRecordings(idx);
  if(btn.dataset.act==='check'&&idx!=null)checkPronunciation(idx);
  // Quiz
  if(btn.dataset.choice)answerQuiz(btn.dataset.choice);
  // Quiz panel toggle
  if(btn.id==='btnQuiz'){const p=$('quizPanel');const open=!p.classList.contains('open');p.classList.toggle('open',open);if(open)makeQuiz()}
  if(btn.id==='quizClose')$('quizPanel').classList.remove('open');
  if(btn.id==='quizNext')makeQuiz();
  if(btn.id==='quizSpeak'&&S.quizQ)speak(S.quizQ.answer.eg[0]);
});

$('search').addEventListener('input',e=>{S.search=e.target.value;S.expandedIdx=-1;updateCards()});
updateStats();updateCards();if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
